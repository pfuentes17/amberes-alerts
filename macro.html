<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--nv:#0b1825;--nv2:#111f30;--nv3:#0f1c2b;--gd:#c9a84c;--gdl:#e8c97a;--gdm:rgba(201,168,76,.12);--g2:#2d7a55;--g3:#3da06e;--g4:#5cbf8a;--rd:#d95f5f;--bl:#5aaee0;--or:#e8a044;--wh:#f2efe8;--dm:rgba(242,239,232,.45);--ft:rgba(242,239,232,.08);--br:rgba(201,168,76,.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--nv);color:var(--wh);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:sticky;top:0;z-index:200;background:#1e1e22;border-bottom:3px solid var(--gd);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.amb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.amb-wordmark{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;}
.amb-divider{width:1px;height:18px;background:rgba(255,255,255,.2);margin:0 8px;}
.amb-section{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.06em;color:rgba(255,255,255,.45);}
.hd-l,.hd-r{display:flex;align-items:center;}
.hd-r{gap:12px;}
.live{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g4);padding:3px 8px;border:1px solid rgba(92,191,138,.3);background:rgba(92,191,138,.06);}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--g4);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.cs{position:relative;}
.csb{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--nv3);border:1px solid var(--br);color:var(--gdl);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.csb:hover,.csb.open{border-color:var(--gd);background:var(--gdm);}
.csa{font-size:9px;color:var(--dm);transition:transform .2s;}
.csb.open .csa{transform:rotate(180deg);}
.csd{position:absolute;right:0;top:calc(100% + 5px);background:var(--nv2);border:1px solid var(--br);min-width:190px;z-index:300;opacity:0;visibility:hidden;transform:translateY(-5px);transition:all .16s ease;}
.csd.open{opacity:1;visibility:visible;transform:translateY(0);}
.cso{display:flex;align-items:center;gap:11px;padding:10px 15px;cursor:pointer;font-size:11px;color:var(--dm);border-bottom:1px solid rgba(201,168,76,.07);transition:all .14s;}
.cso:last-child{border-bottom:none;}
.cso:hover,.cso.active{background:var(--gdm);color:var(--gdl);}
.cso .fl{font-size:19px;}
.kstrip{display:flex;overflow-x:auto;background:var(--nv2);border-bottom:1px solid var(--br);}
.kstrip::-webkit-scrollbar{height:2px;}
.ki{flex:0 0 auto;min-width:130px;padding:12px 18px;border-right:1px solid var(--br);transition:background .2s;}
.ki:last-child{border-right:none;}
.ki:hover{background:var(--ft);}
.kl{font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);margin-bottom:4px;}
.kv{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;line-height:1;}
.kn{font-size:9px;color:var(--dm);margin-top:2px;}
.g{color:#5cbf8a;}.r{color:#d95f5f;}.a{color:#e8c97a;}
.tabrow{display:flex;overflow-x:auto;background:var(--nv2);border-bottom:1px solid var(--br);padding:0 44px;}
.tabrow::-webkit-scrollbar{height:2px;}
.tab{padding:12px 18px;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;color:var(--dm);font-family:'DM Sans',sans-serif;font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;cursor:pointer;transition:all .2s;flex-shrink:0;}
.tab:hover{color:var(--wh);}
.tab.active{color:var(--gdl);border-bottom-color:var(--gd);}
.main{padding:30px 44px 60px;}
.panel{display:none;animation:fi .2s ease;}
.panel.active{display:block;min-height:200px;}
.panel-inner{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;}
.panel-left{display:flex;flex-direction:column;gap:18px;}
.panel-right{position:sticky;top:80px;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.sh{padding-bottom:14px;margin-bottom:20px;border-bottom:1px solid var(--br);display:flex;align-items:flex-end;justify-content:space-between;}
.st{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;}
.ss{font-size:9px;color:var(--dm);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.ln{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:500;line-height:1;text-align:right;}
.ll{font-size:8.5px;color:var(--dm);letter-spacing:1.4px;text-transform:uppercase;text-align:right;margin-top:3px;}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.sc{background:var(--nv3);border:1px solid var(--br);padding:14px 16px;}
.sl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dm);margin-bottom:5px;}
.sv{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;line-height:1;}
.sn{font-size:9px;color:var(--dm);margin-top:3px;}
.cg1{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:14px;}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:var(--nv3);border:1px solid var(--br);padding:18px 20px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--gd);opacity:.45;}
.ct{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gd);margin-bottom:14px;padding-left:9px;}
.ch{position:relative;}
.h240{height:240px;}.h190{height:190px;}
/* CALENDAR WIDGET */
.cal-wrap{background:var(--nv3);border:1px solid var(--br);padding:18px 20px;}
.cal-title{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gd);margin-bottom:14px;padding-left:9px;}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--wh);text-align:center;margin-bottom:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.cal-dow{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);text-align:center;padding:3px 0;}
.cal-day{font-size:11px;text-align:center;padding:5px 2px;color:var(--dm);border-radius:3px;min-height:26px;line-height:16px;}
.cal-day.has-event{background:var(--gdm);color:var(--gdl);cursor:default;border:1px solid rgba(201,168,76,.25);}
.cal-day.today{border:1px solid var(--gd);color:var(--gd);}
.cal-events{border-top:1px solid var(--br);padding-top:12px;display:flex;flex-direction:column;gap:8px;}
.cal-event{display:flex;gap:10px;align-items:flex-start;}
.cal-event-date{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--gd);line-height:1;min-width:24px;text-align:center;}
.cal-event-info{flex:1;}
.cal-event-name{font-size:10px;color:var(--wh);margin-bottom:1px;}
.cal-event-val{font-size:9px;color:var(--dm);}
.cal-event-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.dot-g{background:var(--g4);}.dot-r{background:var(--rd);}.dot-a{background:var(--gd);}
/* OVERVIEW */
.og{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.oc{background:var(--nv3);border:1px solid var(--br);padding:16px 18px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,background .2s;min-height:140px;}
.oc:hover{border-color:var(--gd);background:rgba(201,168,76,.04);}
.oc::after{content:'\2192';position:absolute;bottom:12px;right:14px;color:var(--gd);opacity:0;transition:opacity .2s;font-size:13px;}
.oc:hover::after{opacity:1;}
.ot{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gd);margin-bottom:8px;}
.on{font-family:'Cormorant Garamond',serif;font-size:15px;margin-bottom:2px;}
.od{font-size:9px;color:var(--dm);margin-bottom:10px;}
.mc{height:46px;position:relative;min-height:46px;}
.of{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px;padding-top:8px;border-top:1px solid var(--ft);}
.ov2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;line-height:1;}
.op{font-size:8.5px;color:var(--dm);letter-spacing:1px;text-transform:uppercase;}
.ox{font-size:9px;color:var(--dm);text-align:right;line-height:1.5;}
footer{border-top:1px solid var(--br);padding:12px 44px;background:var(--nv2);display:flex;justify-content:space-between;align-items:center;}
.fb{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gd);}
.fn{font-size:8.5px;color:var(--dm);}
@media(max-width:900px){
  header{padding:0 18px;}.main{padding:20px 18px 48px;}
  .panel-inner{grid-template-columns:1fr;}
  .panel-right{position:static;}
  .cg2{grid-template-columns:1fr;}
  .sr{grid-template-columns:repeat(2,1fr);}
  .og{grid-template-columns:1fr 1fr;}
  .tabrow{padding:0 18px;}
}

.subnav{background:#0e1520;border-bottom:1px solid rgba(255,255,255,.08);padding:0 24px;display:flex;align-items:center;gap:5px;height:36px;position:sticky;top:58px;z-index:190;overflow-x:auto;scrollbar-width:none;}

</style>

<script>
var $=function(id){return document.getElementById(id);};
var C={G2:'#2d7a55',G3:'#3da06e',G4:'#5cbf8a',RD:'#d95f5f',BL:'#5aaee0',OR:'#e8a044',GD:'#c9a84c',GDM:'rgba(201,168,76,.12)',WH:'rgba(242,239,232,.85)',DM:'rgba(242,239,232,.4)',NV2:'#111f30'};
var gc={color:'rgba(201,168,76,.07)',drawBorder:false};
var tk={color:C.DM,font:{size:10,family:"'DM Sans',sans-serif"},maxRotation:45};
function tip(){return{backgroundColor:C.NV2,borderColor:C.GD,borderWidth:1,titleColor:C.GD,bodyColor:C.WH,cornerRadius:0,padding:10,titleFont:{size:11,family:"'DM Sans',sans-serif"},bodyFont:{size:11,family:"'DM Sans',sans-serif"}};}
function ax(s){return{x:{grid:gc,ticks:tk,border:{color:'transparent'}},y:{grid:gc,ticks:{color:C.DM,font:{size:10,family:"'DM Sans',sans-serif"},maxRotation:45,callback:function(v){return v+(s||'%');}},border:{color:'transparent'}}};}
var L=function(a){return a[a.length-1];};
var pct=function(v){return (v>=0?'+':'')+v+'%';};
var sgn=function(v){return v>=0?'g':'r';};
var GB=function(v){return v>=0?C.G4:C.RD;};
function destroyAll(){try{var ins=Chart.instances;if(ins){Object.values(ins).forEach(function(c){c.destroy();});}}catch(e){}}

function bar(id,labels,data,opts){
  var el=$(id);if(!el)return;
  opts=opts||{};
  var bg=opts.cf?data.map(opts.cf):(opts.c||C.GD);
  new Chart(el,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:bg,borderWidth:0,borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:C.NV2,borderColor:C.GD,borderWidth:1,titleColor:C.GD,bodyColor:C.WH,cornerRadius:0,padding:10,callbacks:{label:function(c){return (opts.pre||'')+c.parsed.y+(opts.s||'%');}}}},
      scales:ax(opts.s||'%')}});
}
function line(id,labels,datasets,suf){
  var el=$(id);if(!el)return;
  new Chart(el,{type:'line',data:{labels:labels,datasets:datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:datasets.length>1,labels:{color:C.DM,font:{size:10},boxWidth:12,padding:10}},tooltip:{backgroundColor:C.NV2,borderColor:C.GD,borderWidth:1,titleColor:C.GD,bodyColor:C.WH,cornerRadius:0,padding:10}},
      scales:ax(suf||'%')}});
}
function mini(id,vals,color){
  var el=$(id);if(!el)return;
  new Chart(el,{type:'line',data:{labels:vals.map(function(){return '';}),datasets:[{data:vals,borderColor:color,borderWidth:1.8,pointRadius:0,fill:{target:'origin',above:color+'28'},tension:0.4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});
}

// ══ COUNTRY SWITCHER ══
var ctries={us:{f:'&#127482;&#127480;',n:'EE.UU.'},br:{f:'&#127463;&#127479;',n:'Brasil'},cn:{f:'&#127464;&#127475;',n:'China'},eu:{f:'&#127466;&#127482;',n:'Europa'},jp:{f:'&#127471;&#127477;',n:'Jap&#243;n'},cal:{f:'&#128197;',n:'Calendario'}};
function toggleCS(){$('csb').classList.toggle('open');$('csd').classList.toggle('open');}
document.addEventListener('click',function(e){if(!$('cs').contains(e.target)){$('csb').classList.remove('open');$('csd').classList.remove('open');}});
function go(c){
  $('csb').classList.remove('open');$('csd').classList.remove('open');
  document.querySelectorAll('.cso').forEach(function(el,i){el.classList.toggle('active',Object.keys(ctries)[i]===c);});
  $('csf').innerHTML=ctries[c].f;$('csn').innerHTML=ctries[c].n;
  destroyAll();
  var fns={us:buildUS,br:buildBR,cn:buildCN,eu:buildEU,jp:buildJP,cal:buildCAL};
  fns[c]();
}
function showTab(i,pref){
  document.querySelectorAll('[id^="'+pref+'-p"]').forEach(function(p){p.classList.remove('active');});
  var t=$(pref+'-p'+i);if(t)t.classList.add('active');
  document.querySelectorAll('.tab').forEach(function(b,j){b.classList.toggle('active',j===i);});
}

// ══ CALENDAR ══
function makeCalendar(year,month,events){
  // month is 0-indexed
  var months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var days=['L','M','X','J','V','S','D'];
  var daysInMonth=new Date(year,month+1,0).getDate();
  var firstDay=new Date(year,month,1).getDay();
  firstDay=(firstDay+6)%7; // Monday=0
  var today=new Date();
  var isCurrentMonth=(today.getFullYear()===year && today.getMonth()===month);
  var todayNum=isCurrentMonth?today.getDate():0;
  var eventDays={};
  (events||[]).forEach(function(ev){eventDays[ev.day]=ev;});
  var html='<div class="cal-wrap">';
  html+='<div class="cal-title">Calendario de datos</div>';
  html+='<div class="cal-month">'+months[month]+' '+year+'</div>';
  html+='<div class="cal-grid">';
  days.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  for(var i=0;i<firstDay;i++){html+='<div class="cal-day"></div>';}
  for(var d=1;d<=daysInMonth;d++){
    var cls='cal-day';
    if(d===todayNum)cls+=' today';
    if(eventDays[d])cls+=' has-event';
    html+='<div class="'+cls+'">'+d+'</div>';
  }
  html+='</div>';
  if(events&&events.length){
    html+='<div class="cal-events">';
    events.forEach(function(ev){
      html+='<div class="cal-event">';
      html+='<div class="cal-event-date">'+ev.day+'</div>';
      html+='<div class="dot-'+ev.col+'" style="width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;background:'+(ev.col==='g'?C.G4:ev.col==='r'?C.RD:C.GD)+';"></div>';
      html+='<div class="cal-event-info"><div class="cal-event-name">'+ev.name+'</div><div class="cal-event-val">'+ev.val+'</div></div>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

// ══ HTML HELPERS ══
function kpis(items){return items.map(function(k){return '<div class="ki"><div class="kl">'+k.l+'</div><div class="kv '+k.c+'">'+k.v+'</div></div>';}).join('');}
function tabs(items,pref){return items.map(function(t,i){return '<button class="tab'+(i===0?' active':'')+'" onclick="showTab('+i+',\''+pref+'\')">'+t+'</button>';}).join('');}
function sr4(cards){return '<div class="sr">'+cards.map(function(c){return '<div class="sc"><div class="sl">'+c.l+'</div><div class="sv '+(c.c||'')+'">'+c.v+'</div><div class="sn">'+c.n+'</div></div>';}).join('')+'</div>';}
function shdr(ti,sub,lv,ll,lc){return '<div class="sh"><div><div class="st">'+ti+'</div><div class="ss">'+sub+'</div></div><div><div class="ln '+(lc||'')+'">'+(lv||'')+'</div><div class="ll">'+(ll||'')+'</div></div></div>';}
function box1(id,ht,title){return '<div class="cg1"><div class="card"><div class="ct">'+title+'</div><div class="ch '+ht+'"><canvas id="'+id+'"></canvas></div></div></div>';}
function box2(ids,titles,ht){ht=ht||'h190';return '<div class="cg2">'+ids.map(function(id,i){return '<div class="card"><div class="ct">'+titles[i]+'</div><div class="ch '+ht+'"><canvas id="'+id+'"></canvas></div></div>';}).join('')+'</div>';}
function ocard(mid,tag,name,desc,val,vcls,period,ctx,onclick){return '<div class="oc"'+(onclick?' onclick="'+onclick+'"':'')+'>'+
  '<div class="ot">'+tag+'</div><div class="on">'+name+'</div><div class="od">'+desc+'</div>'+
  '<div class="mc"><canvas id="'+mid+'"></canvas></div>'+
  '<div class="of"><div><div class="ov2 '+vcls+'">'+val+'</div><div class="op">'+period+'</div></div><div class="ox">'+ctx+'</div></div></div>';}

function panel(id,left,right){
  return '<div class="panel" id="'+id+'"><div class="panel-inner"><div class="panel-left">'+left+'</div><div class="panel-right">'+right+'</div></div></div>';
}
function panelFull(id,cnt){
  return '<div class="panel active" id="'+id+'">'+cnt+'</div>';
}

async function loadLiveData() {
  try {
    var results = await Promise.allSettled([
      fetch('/api/macro-us').then(function(r){ return r.ok ? r.json() : null; }),
      fetch('/api/macro-eu').then(function(r){ return r.ok ? r.json() : null; }),
      fetch('/api/macro-jp').then(function(r){ return r.ok ? r.json() : null; }),
      fetch('/api/macro-br').then(function(r){ return r.ok ? r.json() : null; }),
    ]);

    var us     = results[0].status==='fulfilled' && results[0].value?.ok ? results[0].value : null;
    var eu     = results[1].status==='fulfilled' && results[1].value?.ok ? results[1].value : null;
    var jp     = results[2].status==='fulfilled' && results[2].value?.ok ? results[2].value : null;
    var br     = results[3].status==='fulfilled' && results[3].value?.ok ? results[3].value : null;
    var manual = null; // China usa seed data por ahora

    var updated = false;

    if (us) {
      if (us.gdp)     D.us.gdp     = us.gdp;
      if (us.cpi)     { D.us.cpi = us.cpi; if (us.cpiCore) D.us.cpiCore = us.cpiCore; if (us.cpiMoM) D.us.cpiMoM = us.cpiMoM; }
      if (us.pce)     { D.us.pce = us.pce; if (us.pceCore) D.us.pceCore = us.pceCore; if (us.pceMoM) D.us.pceMoM = us.pceMoM; }
      if (us.ppi)     { D.us.ppi = us.ppi; if (us.ppiCore) D.us.ppiCore = us.ppiCore; if (us.ppiMoM) D.us.ppiMoM = us.ppiMoM; }
      if (us.ur)      D.us.ur      = us.ur;
      if (us.nfp)     D.us.nfp     = us.nfp;
      if (us.fed)     D.us.fed     = us.fed;
      if (us.claims)  D.us.claims  = us.claims;
      if (us.trade)   D.us.trade   = us.trade;
      updated = true;
    }
    if (eu) {
      if (eu.cpi)  { D.eu.cpi = eu.cpi; if (eu.cpiCore) D.eu.cpiCore = eu.cpiCore; }
      if (eu.ppi)  D.eu.ppi  = eu.ppi;
      if (eu.bce)  D.eu.bce  = eu.bce;
      if (eu.ur)   D.eu.ur   = eu.ur;
      if (eu.gdp)  D.eu.gdp  = eu.gdp;
      updated = true;
    }
    if (jp) {
      if (jp.cpi)  { D.jp.cpi = jp.cpi; if (jp.cpiCore) D.jp.cpiCore = jp.cpiCore; }
      if (jp.ppi)  D.jp.ppi  = jp.ppi;
      if (jp.ur)   D.jp.ur   = jp.ur;
      if (jp.gdp)  D.jp.gdp  = jp.gdp;
      if (jp.boj)  D.jp.boj  = jp.boj;
      if (jp.trade)D.jp.trade = jp.trade;
      updated = true;
    }
    if (br) {
      if (br.cpi)   { D.br.cpi = br.cpi; if (br.cpiMoM) D.br.cpiMoM = br.cpiMoM; }
      if (br.selic) D.br.selic = br.selic;
      if (br.ur)    D.br.ur    = br.ur;
      if (br.gdp)   D.br.gdp   = br.gdp;
      updated = true;
    }
    // Manual data (scheduler-updated) — Brasil CPI/UR fallback + China
    if (manual) {
      var mb = manual.brasil, mc = manual.china;
      if (mb) {
        if (mb.cpi   && !D.br.cpi?.l?.length)   D.br.cpi    = mb.cpi;
        if (mb.cpiMoM && !br?.cpiMoM)            D.br.cpiMoM = mb.cpiMoM;
        if (mb.selic && !br?.selic)              D.br.selic  = mb.selic;
        if (mb.ur    && !br?.ur)                 D.br.ur     = mb.ur;
      }
      if (mc) {
        if (mc.cpi)    D.cn.cpi    = mc.cpi;
        if (mc.ppi)    D.cn.ppi    = mc.ppi;
        if (mc.pmiNbs) D.cn.pmiNbs = mc.pmiNbs;
        if (mc.ip)     D.cn.ip     = mc.ip;
        if (mc.ret)    D.cn.ret    = mc.ret;
        if (mc.rate)   D.cn.rate   = mc.rate;
      }
      updated = true;
    }

    if (updated) {
      // Re-render current view
      var active = document.querySelector('.cso.active');
      if (active) active.click();
      else if (typeof buildUS === 'function') buildUS();
      var dot = document.querySelector('.ldot');
      if (dot) dot.style.background = '#5cbf8a';
      var liveEl = document.querySelector('.live');
      if (liveEl) liveEl.innerHTML = '<span class="ldot"></span>Live · ' + new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    }
  } catch(e) {
    console.warn('macro loadLiveData:', e.message);
  }
}

function buildCAL(){
  var today=new Date();today.setHours(0,0,0,0);
  var MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  // Índice de eventos por fecha
  var byDate={};
  CAL_EVENTS.forEach(function(ev){
    if(!byDate[ev.d])byDate[ev.d]=[];
    byDate[ev.d].push(ev);
  });

  // Próximo evento
  var upcoming=CAL_EVENTS.filter(function(e){return new Date(e.d+'T12:00:00Z')>=today;}).sort(function(a,b){return a.d>b.d?1:-1;});
  var nextEv=upcoming[0];
  var nextLabel=nextEv?(nextEv.d.slice(8)+' '+MES[parseInt(nextEv.d.slice(5,7))-1]):'—';

  $('kstrip').innerHTML=kpis([
    {l:'Próximo evento',v:nextLabel,c:'a'},
    {l:'Eventos jul 2026',v:CAL_EVENTS.filter(function(e){return e.d.startsWith('2026-07');}).length,c:'a'},
    {l:'Eventos ago 2026',v:CAL_EVENTS.filter(function(e){return e.d.startsWith('2026-08');}).length,c:'a'},
    {l:'Auto-actualizan',v:CAL_EVENTS.filter(function(e){return e.auto;}).length,c:'g'},
    {l:'Update manual',v:CAL_EVENTS.filter(function(e){return !e.auto;}).length,c:'r'},
    {l:'Reuniones tasas',v:CAL_EVENTS.filter(function(e){return e.col==='g';}).length,c:'a'},
    {l:'Total eventos',v:CAL_EVENTS.length,c:'a'},
    {l:'Período',v:'Jul–Dic',c:'a'}
  ]);
  $('tabrow').innerHTML='';

  // Construir grillas por mes
  var months=[
    {y:2026,m:6},{y:2026,m:7},{y:2026,m:8},
    {y:2026,m:9},{y:2026,m:10},{y:2026,m:11},{y:2026,m:12}
  ];

  var html='<div style="max-width:980px;margin:0 auto">';

  // Header
  html+='<div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;margin-bottom:24px;border-bottom:1px solid var(--br)">';
  html+='<div><div style="font-family:\'Cormorant Garamond\',serif;font-size:26px">Calendario de Publicaciones <strong>Macroecon&#243;micas</strong></div>';
  html+='<div style="font-size:9px;color:var(--dm);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px">Junio &ndash; Diciembre 2026 &middot; Todos los pa&#237;ses</div></div>';
  html+='<div style="display:flex;gap:14px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);flex-wrap:wrap;justify-content:flex-end">';
  html+='<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:'+C.G4+';display:inline-block"></span>Auto-API</div>';
  html+='<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:'+C.GD+';display:inline-block"></span>Manual</div>';
  html+='<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:'+C.RD+';display:inline-block"></span>Tasas</div>';
  html+='</div></div>';

  // Grid de 2 columnas para meses
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:28px">';

  months.forEach(function(mo){
    var y=mo.y,m=mo.m;
    var mesKey=y+'-'+(m<9?'0':'')+(m+1);
    var mesNom=MESES[m]+' '+y;
    var firstDay=new Date(y,m,1);
    var daysInMonth=new Date(y,m+1,0).getDate();
    var startDow=firstDay.getDay(); // 0=Dom

    html+='<div style="background:var(--nv3);border:1px solid var(--br);padding:16px">';

    // Nombre del mes
    html+='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:12px;text-align:center">'+mesNom+'</div>';

    // Días de la semana
    html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
    DIAS.forEach(function(d){
      html+='<div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);text-align:center;padding:3px 0">'+d+'</div>';
    });
    html+='</div>';

    // Grilla de días
    html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';

    // Celdas vacías al inicio
    for(var i=0;i<startDow;i++){
      html+='<div></div>';
    }

    // Días del mes
    for(var day=1;day<=daysInMonth;day++){
      var dateStr=y+'-'+(m<9?'0':'')+(m+1)+'-'+(day<10?'0':'')+day;
      var evs=byDate[dateStr]||[];
      var d=new Date(y,m,day);
      var isPast=d<today;
      var isToday=(d.getTime()===today.getTime());

      var hasRate=evs.some(function(e){return e.col==='g';});
      var hasAuto=evs.some(function(e){return e.auto;});
      var hasManual=evs.some(function(e){return !e.auto&&e.col!=='g';});

      var bg='transparent';
      var border='transparent';
      var txtColor=isPast?'rgba(242,239,232,0.2)':'var(--dm)';

      if(isToday){border='1px solid '+C.GD;txtColor=C.GD;}
      else if(evs.length>0 && !isPast){
        if(hasRate){bg='rgba(217,95,95,0.15)';border='1px solid rgba(217,95,95,0.4)';}
        else if(hasAuto){bg='rgba(92,191,138,0.12)';border='1px solid rgba(92,191,138,0.3)';}
        else{bg='rgba(201,168,76,0.1)';border='1px solid rgba(201,168,76,0.3)';}
        txtColor='var(--wh)';
      }

      html+='<div style="border:'+border+';background:'+bg+';padding:4px 2px;text-align:center;min-height:42px;cursor:'+(evs.length?'pointer':'default')+';position:relative" '+(evs.length?'onclick="showCalDay(\''+dateStr+'\')"':'')+' title="'+(evs.length?evs.map(function(e){return e.n;}).join(', '):'')+'">';

      html+='<div style="font-size:10px;color:'+txtColor+';font-weight:'+(evs.length&&!isPast?'600':'400')+';margin-bottom:2px">'+day+'</div>';

      if(evs.length&&!isPast){
        // Flags pequeños
        var flags=[];
        evs.forEach(function(e){if(flags.indexOf(e.f)<0)flags.push(e.f);});
        html+='<div style="font-size:8px;line-height:1.2;overflow:hidden">'+flags.slice(0,3).join('')+'</div>';
        if(evs.length>1){
          html+='<div style="font-size:7px;color:'+(hasRate?C.RD:hasAuto?C.G4:C.GD)+';font-weight:700">'+evs.length+'ev</div>';
        }
      }
      html+='</div>';
    }
    html+='</div>';

    // Lista de eventos del mes debajo del calendario
    var mesEvs=CAL_EVENTS.filter(function(e){return e.d.startsWith(mesKey);});
    if(mesEvs.length){
      html+='<div style="margin-top:12px;border-top:1px solid var(--br);padding-top:10px;display:flex;flex-direction:column;gap:5px">';
      mesEvs.forEach(function(ev){
        var evDate=new Date(ev.d+'T12:00:00Z');
        var evPast=evDate<today;
        var dotColor=ev.col==='g'?C.RD:(ev.auto?C.G4:C.GD);
        html+='<div style="display:flex;align-items:center;gap:7px;opacity:'+(evPast?'0.35':'1')+'">';
        html+='<div style="width:3px;height:3px;border-radius:50%;background:'+dotColor+';flex-shrink:0;margin-top:1px"></div>';
        html+='<div style="font-size:9px;color:var(--dm);min-width:28px">'+parseInt(ev.d.slice(8))+'</div>';
        html+='<div style="font-size:8px">'+ev.f+'</div>';
        html+='<div style="font-size:9px;color:'+(evPast?'var(--dm)':'var(--wh)')+';flex:1">'+ev.n+'</div>';
        html+='<div style="font-size:8px;color:'+dotColor+';letter-spacing:.5px">'+(ev.col==='g'?'★':(ev.auto?'●':'○'))+'</div>';
        html+='</div>';
      });
      html+='</div>';
    }

    html+='</div>'; // end mes card
  });

  html+='</div>'; // end grid
  html+='</div>'; // end container

  $('main').innerHTML='<div class="panel active" id="cal-p0" style="overflow-y:auto;padding-bottom:40px">'+html+'</div>';

  // Modal de día al hacer click
  window.showCalDay=function(dateStr){
    var evs=byDate[dateStr]||[];
    if(!evs.length)return;
    var d=new Date(dateStr+'T12:00:00Z');
    var label=DIAS[d.getUTCDay()]+' '+d.getUTCDate()+' de '+MESES[d.getUTCMonth()]+' '+d.getUTCFullYear();
    var modal='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center" onclick="this.remove()">';
    modal+='<div style="background:var(--nv2);border:1px solid var(--br);padding:24px;max-width:420px;width:90%;border-radius:2px" onclick="event.stopPropagation()">';
    modal+='<div style="font-family:\'Cormorant Garamond\',serif;font-size:20px;margin-bottom:4px">'+label+'</div>';
    modal+='<div style="font-size:8px;color:var(--dm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px">'+evs.length+' evento'+(evs.length>1?'s':'')+'</div>';
    evs.forEach(function(ev){
      var dotColor=ev.col==='g'?C.RD:(ev.auto?C.G4:C.GD);
      modal+='<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--br)">';
      modal+='<div style="font-size:22px">'+ev.f+'</div>';
      modal+='<div style="flex:1"><div style="font-size:12px;color:var(--wh);font-weight:500">'+ev.n+'</div>';
      modal+='<div style="font-size:10px;color:var(--dm);margin-top:3px">'+ev.c+' · '+ev.det+'</div></div>';
      modal+='<div style="font-size:8px;color:'+dotColor+';letter-spacing:1px;text-transform:uppercase;white-space:nowrap">'+(ev.col==='g'?'★ Tasas':(ev.auto?'● Auto':'○ Manual'))+'</div>';
      modal+='</div>';
    });
    modal+='<div style="margin-top:14px;text-align:right"><span style="font-size:9px;color:var(--dm);cursor:pointer;letter-spacing:1px;text-transform:uppercase" onclick="this.closest(\'[style*=fixed]\').remove()">Cerrar ✕</span></div>';
    modal+='</div></div>';
    document.body.insertAdjacentHTML('beforeend',modal);
  };
}

// Cargar seed.json desde /api/seed y sobreescribir D antes del build
(function(){
  fetch('/api/seed').then(function(r){ return r.ok ? r.json() : null; }).then(function(s){
    if(!s) return;
    ['us','br','cn','eu','jp'].forEach(function(k){ if(s[k]) Object.assign(D[k], s[k]); });
    if(s._meta) console.info('[seed] actualizado:', s._meta.updated);
  }).catch(function(){}).finally(function(){
    buildUS();
    setTimeout(function(){ loadLiveData().catch(function(e){ console.warn(e); }); }, 500);
  });
})();
</script>
</body>
</html>
