<title>Agro Global &amp; Argentina | Amberes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --nv:#07111d;--nv2:#0c1a28;--nv3:#0a1622;
  --cel:#4a9fd4;--cell:#7bbfe8;
  --g4:#4db87a;--rd:#d95f5f;--or:#e8a044;--wh:#f0f4f8;
  --dm:rgba(240,244,248,.42);--ft:rgba(240,244,248,.07);
  --br:rgba(74,159,212,.18);
  --agro:#4db87a;--agro-m:rgba(77,184,122,.12);
  --cbot:#e8c84a;--cot:#9b7fe8;--wasde:#4a9fd4;--arg:#e8a044;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--nv);color:var(--wh);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:sticky;top:0;z-index:200;background:rgba(7,17,29,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--br);padding:0 40px;height:62px;display:flex;align-items:center;justify-content:space-between;}
.hd-l{display:flex;align-items:center;}
.logo-img{height:32px;filter:brightness(0) invert(1);opacity:.9;}
.hd-div{width:1px;height:26px;background:var(--br);margin:0 16px;}
.hd-t{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;}
.hd-t span{color:var(--agro);}
.hd-s{font-size:8.5px;color:var(--dm);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.hd-r{display:flex;align-items:center;gap:10px;}
.flag{padding:5px 12px;border:1px solid var(--br);font-size:10.5px;color:var(--cell);letter-spacing:1px;text-transform:uppercase;}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--agro);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
/* KPI strip */
.kstrip{display:flex;overflow-x:auto;background:var(--nv2);border-bottom:1px solid var(--br);}
.kstrip::-webkit-scrollbar{height:2px;}
.ki{flex:0 0 auto;min-width:138px;padding:11px 16px;border-right:1px solid var(--br);transition:background .2s;}
.ki:hover{background:var(--ft);}
.kl{font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);margin-bottom:3px;}
.kv{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500;line-height:1;}
.kn{font-size:8.5px;color:var(--dm);margin-top:2px;}
.g{color:#4db87a;}.r{color:#d95f5f;}.a{color:#7bbfe8;}.m{color:#e8a044;}.p{color:#9b7fe8;}.y{color:#e8c84a;}
/* Tabs */
.tabrow{display:flex;overflow-x:auto;background:var(--nv2);border-bottom:1px solid var(--br);padding:0 40px;}
.tab{padding:11px 18px;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;color:var(--dm);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1.3px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.tab:hover{color:var(--wh);}
.tab.active{color:var(--agro);border-bottom-color:var(--agro);}
/* Main */
.main{padding:26px 40px 60px;}
.panel{display:none;animation:fi .2s ease;}
.panel.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
/* Section header */
.sh{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:12px;margin-bottom:18px;border-bottom:1px solid var(--br);}
.st{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:400;}
.ss{font-size:8.5px;color:var(--dm);letter-spacing:1.4px;text-transform:uppercase;margin-top:4px;}
.ln{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;line-height:1;text-align:right;}
.ll{font-size:8px;color:var(--dm);letter-spacing:1.3px;text-transform:uppercase;text-align:right;margin-top:3px;}
/* Grids */
.sr5{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:12px;}
.sr4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
.sr3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px;}
.sr2{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px;}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.og5{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:18px;}
.og3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px;}
/* Stat cards */
.sc{background:var(--nv3);border:1px solid var(--br);padding:12px 14px;}
.sc.cbot{border-left:2px solid var(--cbot);}
.sc.cot{border-left:2px solid var(--cot);}
.sc.wasde{border-left:2px solid var(--wasde);}
.sc.arg{border-left:2px solid var(--arg);}
.sc.agro{border-left:2px solid var(--agro);}
.sl{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dm);margin-bottom:4px;}
.sv{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;line-height:1;}
.sn{font-size:8.5px;color:var(--dm);margin-top:3px;}
/* Chart cards */
.card{background:var(--nv3);border:1px solid var(--br);padding:15px 17px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--agro);opacity:.5;}
.c-cbot::before{background:var(--cbot);}
.c-cot::before{background:var(--cot);}
.c-wasde::before{background:var(--wasde);}
.c-arg::before{background:var(--arg);}
.c-agro::before{background:var(--agro);}
.ct{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--agro);margin-bottom:11px;padding-left:8px;}
.c-cbot .ct{color:var(--cbot);}.c-cot .ct{color:var(--cot);}.c-wasde .ct{color:var(--wasde);}.c-arg .ct{color:var(--arg);}
.ch{position:relative;}
.h240{height:240px;}.h200{height:200px;}.h165{height:165px;}
/* Overview cards */
.oc{background:var(--nv3);border:1px solid var(--br);padding:13px 15px;cursor:pointer;transition:border-color .2s,background .2s;}
.oc:hover{border-color:var(--agro);background:var(--agro-m);}
.ot{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:var(--agro);margin-bottom:7px;}
.on{font-family:'Cormorant Garamond',serif;font-size:14px;margin-bottom:2px;}
.of{display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px;padding-top:7px;border-top:1px solid var(--ft);}
.ov{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;line-height:1;}
.ox{font-size:8.5px;color:var(--dm);text-align:right;line-height:1.5;}
/* Source */
.src{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dm);margin-bottom:12px;border-bottom:1px solid var(--br);padding-bottom:8px;}
/* COT badge */
.cot-badge{display:inline-block;padding:2px 8px;font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:500;}
.cot-long{background:rgba(77,184,122,.15);color:#4db87a;border:1px solid rgba(77,184,122,.3);}
.cot-short{background:rgba(217,95,95,.15);color:#d95f5f;border:1px solid rgba(217,95,95,.3);}
.cot-neutral{background:rgba(240,244,248,.06);color:var(--dm);border:1px solid var(--br);}
/* WASDE table */
.w-tbl{width:100%;border-collapse:collapse;margin-bottom:10px;}
.w-tbl th{font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);text-align:right;padding:8px 10px;border-bottom:1px solid var(--br);}
.w-tbl th:first-child{text-align:left;}
.w-tbl td{padding:9px 10px;border-bottom:1px solid rgba(74,159,212,.05);text-align:right;font-family:'Cormorant Garamond',serif;font-size:16px;}
.w-tbl td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--wh);}
.w-tbl tr:hover td{background:var(--ft);}
/* Price table */
.p-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;}
.p-tbl th{font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);padding:7px 10px;border-bottom:1px solid var(--br);text-align:right;}
.p-tbl th:first-child{text-align:left;}
.p-tbl td{padding:10px 10px;border-bottom:1px solid rgba(74,159,212,.05);text-align:right;}
.p-tbl td:first-child{text-align:left;color:var(--wh);}
.p-tbl tr:hover td{background:var(--ft);}
.p-usd{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;}
/* Ratio/progress bars */
.ratio-bar{height:6px;background:rgba(74,159,212,.08);border:1px solid var(--br);border-radius:2px;overflow:hidden;margin:4px 0 2px;}
.ratio-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.prog-label{font-size:11px;width:68px;flex-shrink:0;}
.prog-bar{flex:1;height:8px;background:rgba(74,159,212,.1);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;}
.prog-val{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;width:42px;text-align:right;flex-shrink:0;}
.prog-sub{font-size:8.5px;color:var(--dm);width:90px;text-align:right;flex-shrink:0;}
/* Retenciones */
.ret-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px;}
.ret-card{background:var(--nv3);border:1px solid var(--br);padding:10px 12px;text-align:center;}
.ret-crop{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dm);margin-bottom:4px;}
.ret-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--rd);}
.ret-sub{font-size:8px;color:var(--dm);margin-top:2px;}
/* Info / comment boxes */
.infobox{background:rgba(74,159,212,.04);border:1px solid var(--br);border-left:2px solid var(--wasde);padding:14px 16px;margin-bottom:14px;}
.infobox-t{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--wasde);margin-bottom:8px;}
.infobox-b{font-size:11px;color:rgba(240,244,248,.65);line-height:1.75;}
.infobox-b strong{color:var(--wh);}
.comment{background:rgba(232,200,74,.04);border:1px solid rgba(232,200,74,.2);border-left:2px solid var(--cbot);padding:14px 16px;margin-bottom:14px;}
.comment-t{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--cbot);margin-bottom:8px;}
.comment-b{font-size:11.5px;color:rgba(240,244,248,.7);line-height:1.8;}
.comment-b strong{color:var(--wh);}
/* COT divergence panel */
.div-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--br);}
.div-half{padding:14px 16px;}
.div-half:first-child{border-right:1px solid var(--br);}
.div-lbl{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dm);margin-bottom:6px;}
.div-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;line-height:1;}
.div-sub{font-size:8.5px;color:var(--dm);margin-top:4px;line-height:1.5;}
.div-signal{padding:10px 16px;background:var(--nv3);border-top:1px solid var(--br);font-size:11px;line-height:1.5;}
/* note strip */
.note{font-size:8.5px;color:var(--dm);padding:8px 10px;background:rgba(77,184,122,.04);border:1px solid rgba(77,184,122,.12);margin-bottom:14px;line-height:1.6;}
.note.rd{background:rgba(217,95,95,.04);border-color:rgba(217,95,95,.12);}
.note.or{background:rgba(232,160,68,.04);border-color:rgba(232,160,68,.12);}
/* footer */
footer{border-top:1px solid var(--br);padding:10px 40px;background:var(--nv2);display:flex;justify-content:space-between;align-items:center;}
.fb-t{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--agro);}
@media(max-width:900px){
  header{padding:0 16px;}.main{padding:16px 16px 48px;}
  .og5,.og3{grid-template-columns:1fr 1fr;}
  .cg2{grid-template-columns:1fr;}
  .sr5,.sr4{grid-template-columns:repeat(2,1fr);}
  .sr3{grid-template-columns:1fr 1fr;}
  .tabrow{padding:0 16px;}.ret-grid{grid-template-columns:repeat(3,1fr);}
  .div-grid{grid-template-columns:1fr;}.div-half:first-child{border-right:none;border-bottom:1px solid var(--br);}
}
</style>
</head>

const $ = id => document.getElementById(id);
const fmt = (v,d=1) => v==null?'--':Number(v).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});
const chgStr = (v,d=1) => v==null?'--':`${v>=0?'+':''}${fmt(v,d)}`;
const clr = v => v==null?'a':v>0?'g':v<0?'r':'a';
const C = {AGRO:'#4db87a',CBOT:'#e8c84a',COT:'#9b7fe8',WASDE:'#4a9fd4',ARG:'#e8a044',RD:'#d95f5f',CEL:'#4a9fd4',OR:'#e8a044'};

const chartBase = {
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#111827',borderColor:'#2d4060',borderWidth:1,titleColor:'#e8f0f8',bodyColor:'#94adc8',padding:9}},
  scales:{
    x:{grid:{color:'rgba(31,45,64,.5)'},ticks:{color:'#4a6080',font:{size:9},maxRotation:45}},
    y:{grid:{color:'rgba(31,45,64,.5)'},ticks:{color:'#4a6080',font:{size:9}}},
  },
};
const charts={};
function mkChart(id,cfg){
  if(charts[id])charts[id].destroy();
  const ctx=$(id)?.getContext('2d');if(!ctx)return;
  return charts[id]=new Chart(ctx,cfg);
}

function cotBadge(net,range){
  const pct=((net-range.min)/(range.max-range.min)*100);
  if(pct>=68) return `<span class="cot-badge cot-long">&#9650; ${fmt(pct,0)}%ile Sobrecomprado</span>`;
  if(pct<=32) return `<span class="cot-badge cot-short">&#9660; ${fmt(pct,0)}%ile Sobrevendido</span>`;
  return `<span class="cot-badge cot-neutral">&#9632; ${fmt(pct,0)}%ile Neutral</span>`;
}

function sxuBar(sxu,crop){
  const max=crop==='aceite'?12:40;
  const w=Math.min(100,sxu/max*100);
  const col=sxu>28?C.AGRO:sxu>20?C.OR:C.RD;
  return `<div class="ratio-bar"><div class="ratio-fill" style="width:${w}%;background:${col}"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--dm);"><span>0%</span><span style="color:${col};font-weight:500">${fmt(sxu)}%</span><span>${max}%</span></div>`;
}

function buildTabs(){
  $('tabrow').innerHTML=TABS.map((t,i)=>`<button class="tab${i===0?' active':''}" onclick="showTab(${i})">${t}</button>`).join('');
}
function showTab(i){
  activeTab=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  const fn=[null,initCbotCharts,initCotCharts,initWasdeCharts,initArgCharts];
  if(fn[i]) setTimeout(fn[i],80);
}

function buildCot(){
  const cot=D.cot;
  const crops=[{k:'soja',n:'Soja'},{k:'maiz',n:'Maiz'},{k:'trigo',n:'Trigo'},{k:'aceite',n:'Aceite Soja'}];

  const sumCards=crops.map(c=>{
    const net=cot.mm[c.k].at(-1),lng=cot.mmLong[c.k].at(-1),sht=cot.mmShort[c.k].at(-1),comm=cot.comm[c.k].at(-1),r52=cot.range52[c.k];
    const pct=((net-r52.min)/(r52.max-r52.min)*100);
    return `<div class="sc cot">
      <div class="sl">${c.n} &mdash; MM Net</div><div class="sv ${clr(net)}">${net>=0?'+':''}${net}k</div>
      <div class="sn">Long ${lng}k &middot; Short ${sht}k</div>
      <div class="sn" style="margin-top:3px">Comm: ${comm>=0?'+':''}${comm}k</div>
      <div class="ratio-bar" style="margin-top:6px"><div class="ratio-fill" style="width:${Math.max(2,Math.min(100,pct))}%;background:${net>0?C.AGRO:C.RD}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--dm);margin-top:2px"><span>${r52.min}k</span><span style="color:${net>0?'var(--agro)':'var(--rd)'};">${fmt(pct,0)}%ile</span><span>${r52.max}k</span></div>
    </div>`;
  }).join('');

  const divCards=crops.map(c=>{
    const mmNet=cot.mm[c.k].at(-1),commNet=cot.comm[c.k].at(-1),r52=cot.range52[c.k];
    const pct=((mmNet-r52.min)/(r52.max-r52.min)*100);
    let signal,sigClass,sigIcon;
    if(pct<=32&&commNet>0){signal=`Señal de piso: especuladores vendidos (${fmt(pct,0)}%ile), coberturistas comprados. Potencial soporte.`;sigClass='g';sigIcon='🟢';}
    else if(pct>=68&&commNet<0){signal=`Señal de techo: especuladores comprados (${fmt(pct,0)}%ile), coberturistas vendidos. Riesgo de corrección.`;sigClass='r';sigIcon='🔴';}
    else{signal=`Posicion neutral (${fmt(pct,0)}%ile). Sin señal extrema de MM vs Commercial.`;sigClass='a';sigIcon='⬛';}
    return `<div class="card c-cot" style="padding:14px 16px;margin-bottom:11px;">
      <div class="ct">${c.n} &mdash; MM vs Commercial &middot; Divergencia</div>
      <div class="div-grid">
        <div class="div-half">
          <div class="div-lbl">Managed Money (especuladores)</div>
          <div class="div-val ${clr(mmNet)}">${mmNet>=0?'+':''}${mmNet}k</div>
          <div class="div-sub">${cotBadge(mmNet,r52)}</div>
        </div>
        <div class="div-half">
          <div class="div-lbl">Commercial (hedgers/coberturistas)</div>
          <div class="div-val ${clr(commNet)}">${commNet>=0?'+':''}${commNet}k</div>
          <div class="div-sub" style="font-size:8.5px;color:var(--dm)">Productores/exportadores cubriendo posicion fisica. Tipicamente inverso a MM.</div>
        </div>
      </div>
      <div class="div-signal">${sigIcon} <span class="${sigClass}"><strong>${c.n}:</strong> ${signal}</span></div>
    </div>`;
  }).join('');

  return `
  <div class="sh">
    <div><div class="st">COT &mdash; Commitments of Traders</div>
    <div class="ss">CFTC Disaggregated &middot; Managed Money, Commercial, Non-Reportable &middot; 2-Jun-2026</div></div>
    <div><div class="ln ${clr(cot.mm.soja.at(-1))}">${cot.mm.soja.at(-1)>=0?'+':''}${cot.mm.soja.at(-1)}k</div><div class="ll">MM Soja neto &middot; contratos</div></div>
  </div>
  <div class="src">CFTC (cftc.gov) &middot; Disaggregated COT Report &middot; CBOT &middot; Publicacion semanal viernes (datos martes). Verificar en: cftc.gov/MarketReports/CommitmentsofTraders</div>
  <div class="infobox">
    <div class="infobox-t">&#9432; Verificacion COT</div>
    <div class="infobox-b">Los datos COT se publican cada viernes a las 15:30 ET en <strong>cftc.gov/MarketReports/CommitmentsofTraders</strong>. Buscar "Disaggregated Futures Only" para CBOT. Los datos de esta semana son del martes 2-Jun-2026. Los numeros de esta pagina son estimaciones seed que deben actualizarse con cada reporte semanal.</div>
  </div>
  <div class="sr4" style="margin-bottom:18px;">${sumCards}</div>
  <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--cot);margin-bottom:10px;">&#9670; Indicador MM vs Commercial &mdash; Señal Compradora / Vendedora</div>
  <div class="cg2">${divCards.split('</div>\n').slice(0,2).map(h=>h+'</div>').join('')}</div>
  <div class="cg2">${divCards.split('</div>\n').slice(2,4).map(h=>h+'</div>').join('')}</div>
  <div class="infobox" style="margin-top:4px;">
    <div class="infobox-t">&#9432; Como leer MM vs Commercial</div>
    <div class="infobox-b">
      <strong>Managed Money</strong> = fondos especulativos (hedge funds, CTAs). Posicion neta = long - short. Percentil alto (&ge;68%) = sobrecompra; bajo (&le;32%) = sobreventa.<br><br>
      <strong>Commercial</strong> = productores, exportadores e industriales cubriendo su posicion fisica. Suele ser inversa a MM. Cuando los comerciales acumulan mucha posicion larga neta (inusual), refleja demanda fisica genuina fuerte.<br><br>
      <strong>La señal mas fuerte</strong> se da cuando ambos estan en extremos opuestos: MM muy vendido + Commercial muy comprado = piso especulativo confirmado (senal alcista). MM muy comprado + Commercial muy vendido = exceso de optimismo, riesgo de correccion (senal bajista).
    </div>
  </div>
  <div class="cg2" style="margin-top:4px;">
    <div class="card c-cot"><div class="ct">Soja &mdash; MM Net historico (miles contratos)</div><div class="ch h240"><canvas id="ch-cot-soja"></canvas></div></div>
    <div class="card c-cot"><div class="ct">Maiz &mdash; MM Net historico</div><div class="ch h240"><canvas id="ch-cot-maiz"></canvas></div></div>
  </div>
  <div class="cg2">
    <div class="card c-cot"><div class="ct">Trigo &mdash; MM Net historico</div><div class="ch h240"><canvas id="ch-cot-trigo"></canvas></div></div>
    <div class="card c-cot"><div class="ct">Soja &mdash; MM vs Commercial (comparacion)</div><div class="ch h240"><canvas id="ch-cot-comp"></canvas></div></div>
  </div>`;
}

  const c=D.cot,l=c.l;
  const barCfg=data=>({type:'bar',data:{labels:l,datasets:[{label:'MM Net',data,

  <div class="sr5" style="margin-bottom:18px;">
    ${[
      {l:'Soja',          v:`${a.campania.soja.bcr} Mt`,   n:`BCR &middot; ${a.campania.soja.has}M has &middot; ${a.campania.soja.rinde} qq/ha`},
      {l:'Maiz &#9733; REC.',v:`${a.campania.maiz.bcr} Mt`,n:`BCR &middot; ${a.campania.maiz.has}M has &middot; ${a.campania.maiz.rinde} qq/ha`},
      {l:'Trigo 26/27',   v:`~${a.campania.trigo.bcr} Mt`, n:`Est. BCR &middot; siembra en curso`},
      {l:'Girasol',       v:`${a.campania.girasol.bcr} Mt`,n:`BCR &middot; finalizado`},
      {l:'Cebada',        v:`${a.campania.cebada.bcr} Mt`, n:`BCR &middot; finalizado`},
    ].map(x=>`<div class="sc agro"><div class="sl">${x.l}</div><div class="sv g">${x.v}</div><div class="sn">${x.n}</div></div>`).join('')}
  </div>

  <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--agro);margin-bottom:10px;">CIARA-CEC &mdash; Liquidaciones Exportadoras</div>
  <div class="sr4" style="margin-bottom:6px;">
    <div class="sc agro"><div class="sl">Liquidacion May-26</div><div class="sv g">$${fmt(a.ciara.mayo,0)}M</div><div class="sn">+7% vs abr &middot; verificado</div></div>
    <div class="sc agro"><div class="sl">Acum Ene&ndash;May 2026</div><div class="sv g">$${fmt(a.ciara.acum2026/1000,1)}B</div><div class="sn">-12% vs mismo periodo 2025</div></div>
    <div class="sc agro"><div class="sl">Acum Ene&ndash;May 2025</div><div class="sv m">$${fmt(a.ciara.acum2025/1000,1)}B</div><div class="sn">Base de comparacion</div></div>
    <div class="sc agro"><div class="sl">BCRA Compras 2026</div><div class="sv g">$${fmt(a.bcra.acum2026/1000,1)}B</div><div class="sn">Ene&ndash;May 2026 &middot; MULC</div></div>
  </div>
  <div class="note" style="margin-bottom:18px;">${a.ciara.notas}</div>

  <div class="cg2" style="margin-bottom:11px;">
    <div class="card c-agro"><div class="ct">CIARA-CEC Liquidaciones Mensuales (USD M)</div><div class="ch h240"><canvas id="ch-a-ciara"></canvas></div></div>
    <div class="card c-agro"><div class="ct">BCRA Compras MULC &mdash; Divisas Agro (USD M)</div><div class="ch h240"><canvas id="ch-a-bcra"></canvas></div></div>
  </div>
  <div class="cg2">
    <div class="card c-arg"><div class="ct">Exportaciones Agro &mdash; MOA + PP (USD M, INDEC)</div><div class="ch h240"><canvas id="ch-a-expo"></canvas></div></div>
    <div class="card c-arg"><div class="ct">Expo por Producto &mdash; Acum Ene&ndash;Abr 2026 (USD M)</div><div class="ch h240"><canvas id="ch-a-prod"></canvas></div></div>
  </div>`;
}

function initArgCharts(){
  const a=D.arg;
  mkChart('ch-a-ciara',{type:'bar',data:{labels:a.ciara.l,datasets:[{label:'Liq. USD M',data:a.ciara.vals,
    backgroundColor:a.ciara.vals.map((_,i)=>i>=7?'rgba(77,184,122,.75)':'rgba(77,184,122,.35)'),borderColor:C.AGRO,borderWidth:1}]},
    options:{...chartBase,plugins:{...chartBase.plugins,tooltip:{...chartBase.plugins.tooltip,callbacks:{label:i=>`$${fmt(i.raw,0)}M`}}},
      scales:{x:chartBase.scales.x,y:{...chartBase.scales.y,ticks:{...chartBase.scales.y.ticks,callback:v=>`$${v}M`}}}}});
  mkChart('ch-a-bcra',{type:'bar',data:{labels:a.bcra.l,datasets:[{label:'Compras USD M',data:a.bcra.compras,
    backgroundColor:a.bcra.compras.map((_,i)=>i>=7?'rgba(74,159,212,.75)':'rgba(74,159,212,.35)'),borderColor:C.CEL,borderWidth:1}]},
    options:{...chartBase,plugins:{...chartBase.plugins,tooltip:{...chartBase.plugins.tooltip,callbacks:{label:i=>`$${fmt(i.raw,0)}M`}}},
      scales:{x:chartBase.scales.x,y:{...chartBase.scales.y,ticks:{...chartBase.scales.y.ticks,callback:v=>`$${v}M`}}}}});
  mkChart('ch-a-expo',{type:'bar',data:{labels:a.expo.l,datasets:[
    {label:'MOA',data:a.expo.moa,backgroundColor:'rgba(232,160,68,.75)',borderColor:C.ARG,borderWidth:1,stack:'s'},
    {label:'PP',data:a.expo.pp, backgroundColor:'rgba(77,184,122,.75)',borderColor:C.AGRO,borderWidth:1,stack:'s'},
  ]},options:{...chartBase,plugins:{...chartBase.plugins,legend:{display:true,labels:{color:'#4a6080',font:{size:9},boxWidth:10}}},
    scales:{x:{...chartBase.scales.x,stacked:true},y:{...chartBase.scales.y,stacked:true,ticks:{...chartBase.scales.y.ticks,callback:v=>`$${v}M`}}}}});
  const ep=a.expoProducto;
  mkChart('ch-a-prod',{type:'bar',data:{labels:ep.items,datasets:[{label:'USD M',data:ep.vals,
    backgroundColor:['#e8a044','#e8c84a','#4db87a','#4a9fd4','#7bbfe8','#f59e0b','#9b7fe8','#6b7a8d'],borderColor:'#0a1622',borderWidth:1}]},
    options:{...chartBase,indexAxis:'y',plugins:{...chartBase.plugins,tooltip:{...chartBase.plugins.tooltip,callbacks:{label:i=>`$${fmt(i.raw,0)}M`}}},
      scales:{x:{...chartBase.scales.x,ticks:{...chartBase.scales.x.ticks,callback:v=>`$${v}M`}},y:chartBase.scales.y}}});
}

// ================================================================
// INIT
// ================================================================
function init(){
  buildKstrip(); buildTabs();
  const panels=[buildResumen(),buildCbot(),buildCot(),buildWasde(),buildArg()];
  $('main').innerHTML=panels.map((h,i)=>`<div class="panel${i===0?' active':''}" id="p${i}">${h}</div>`).join('');
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
