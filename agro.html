<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Global &amp; Argentina | Amberes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --nv:#07111d;--nv2:#0c1a28;--nv3:#0a1622;
  --cel:#4a9fd4;--cell:#7bbfe8;--celm:rgba(74,159,212,.12);
  --g4:#4db87a;--rd:#d95f5f;--or:#e8a044;--wh:#f0f4f8;
  --dm:rgba(240,244,248,.42);--ft:rgba(240,244,248,.07);
  --br:rgba(74,159,212,.18);
  --agro:#4db87a;--agro-m:rgba(77,184,122,.12);
  --cbot:#e8c84a;--cbot-m:rgba(232,200,74,.12);
  --cot:#9b7fe8;--cot-m:rgba(155,127,232,.12);
  --wasde:#4a9fd4;--wasde-m:rgba(74,159,212,.12);
  --arg:#e8a044;--arg-m:rgba(232,160,68,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--nv);color:var(--wh);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
header{position:sticky;top:0;z-index:200;background:rgba(7,17,29,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--br);padding:0 40px;height:62px;display:flex;align-items:center;justify-content:space-between;}
.hd-l{display:flex;align-items:center;}
.logo-link{display:flex;align-items:center;text-decoration:none;flex-shrink:0;}
.logo-img{height:32px;width:auto;max-width:120px;filter:brightness(0) invert(1);opacity:.9;}
.hd-div{width:1px;height:26px;background:var(--br);margin:0 16px;}
.hd-t{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;}
.hd-t span{color:var(--agro);}
.hd-s{font-size:8.5px;color:var(--dm);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.hd-r{display:flex;align-items:center;gap:10px;}
.flag{display:flex;align-items:center;gap:7px;padding:5px 12px;border:1px solid var(--br);font-size:10.5px;color:var(--cell);letter-spacing:1px;text-transform:uppercase;}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--agro);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.upd{font-size:8.5px;color:var(--dm);}
/* KPI strip */
.kstrip{display:flex;overflow-x:auto;background:var(--nv2);border-bottom:1px solid var(--br);}
.kstrip::-webkit-scrollbar{height:2px;}
.kstrip::-webkit-scrollbar-thumb{background:var(--agro-m);}
.ki{flex:0 0 auto;min-width:130px;padding:11px 16px;border-right:1px solid var(--br);transition:background .2s;}
.ki:last-child{border-right:none;}
.ki:hover{background:var(--ft);}
.kl{font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);margin-bottom:3px;}
.kv{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500;line-height:1;}
.kn{font-size:8.5px;color:var(--dm);margin-top:2px;}
.g{color:#4db87a;}.r{color:#d95f5f;}.a{color:#7bbfe8;}.m{color:#e8a044;}.p{color:#9b7fe8;}.y{color:#e8c84a;}
/* Tabs */
.tabrow{display:flex;overflow-x:auto;background:var(--nv2);border-bottom:1px solid var(--br);padding:0 40px;}
.tabrow::-webkit-scrollbar{height:2px;}
.tab{padding:11px 18px;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;color:var(--dm);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1.3px;text-transform:uppercase;cursor:pointer;transition:all .2s;flex-shrink:0;}
.tab:hover{color:var(--wh);}
.tab.active{color:var(--agro);border-bottom-color:var(--agro);}
/* Main */
.main{padding:26px 40px 60px;}
.panel{display:none;animation:fi .2s ease;}
.panel.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
/* Layout */
.twocol{display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:start;}
.col-l{display:flex;flex-direction:column;gap:12px;}
.col-r{position:sticky;top:74px;}
/* Section header */
.sh{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:12px;margin-bottom:18px;border-bottom:1px solid var(--br);}
.st{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:400;}
.ss{font-size:8.5px;color:var(--dm);letter-spacing:1.4px;text-transform:uppercase;margin-top:4px;}
.ln{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:500;line-height:1;text-align:right;}
.ll{font-size:8px;color:var(--dm);letter-spacing:1.3px;text-transform:uppercase;text-align:right;margin-top:3px;}
/* Stat rows */
.sr4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
.sr3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px;}
.sr2{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px;}
.sc{background:var(--nv3);border:1px solid var(--br);padding:12px 14px;}
.sc.cbot{border-left:2px solid var(--cbot);}
.sc.cot{border-left:2px solid var(--cot);}
.sc.wasde{border-left:2px solid var(--wasde);}
.sc.arg{border-left:2px solid var(--arg);}
.sc.agro{border-left:2px solid var(--agro);}
.sl{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dm);margin-bottom:4px;}
.sv{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;line-height:1;}
.sn{font-size:8.5px;color:var(--dm);margin-top:3px;}
/* Chart cards */
.cg1{display:grid;grid-template-columns:1fr;gap:11px;margin-bottom:11px;}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.cg3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:11px;}
.cg4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:11px;}
.card{background:var(--nv3);border:1px solid var(--br);padding:15px 17px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--agro);opacity:.5;}
.c-cbot::before{background:var(--cbot);}
.c-cot::before{background:var(--cot);}
.c-wasde::before{background:var(--wasde);}
.c-arg::before{background:var(--arg);}
.c-agro::before{background:var(--agro);}
.c-rd::before{background:var(--rd);}
.ct{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--agro);margin-bottom:11px;padding-left:8px;}
.c-cbot .ct{color:var(--cbot);}
.c-cot .ct{color:var(--cot);}
.c-wasde .ct{color:var(--wasde);}
.c-arg .ct{color:var(--arg);}
.ch{position:relative;}
.h280{height:280px;}.h240{height:240px;}.h200{height:200px;}.h190{height:190px;}.h165{height:165px;}.h140{height:140px;}
/* Overview cards */
.og{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px;}
.og5{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:18px;}
.oc{background:var(--nv3);border:1px solid var(--br);padding:13px 15px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,background .2s;}
.oc:hover{border-color:var(--agro);background:var(--agro-m);}
.ot{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:var(--agro);margin-bottom:7px;}
.on{font-family:'Cormorant Garamond',serif;font-size:14px;margin-bottom:2px;}
.od{font-size:8.5px;color:var(--dm);margin-bottom:8px;}
.mc{height:40px;position:relative;}
.of{display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px;padding-top:7px;border-top:1px solid var(--ft);}
.ov{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;line-height:1;}
.op{font-size:8px;color:var(--dm);letter-spacing:1px;text-transform:uppercase;}
.ox{font-size:8.5px;color:var(--dm);text-align:right;line-height:1.5;}
/* Source badge */
.src{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dm);padding:2px 0;margin-bottom:12px;border-bottom:1px solid var(--br);padding-bottom:8px;}
/* COT señal badge */
.cot-badge{display:inline-block;padding:3px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-left:8px;}
.cot-long{background:rgba(77,184,122,.15);color:#4db87a;border:1px solid rgba(77,184,122,.3);}
.cot-short{background:rgba(217,95,95,.15);color:#d95f5f;border:1px solid rgba(217,95,95,.3);}
.cot-neutral{background:rgba(240,244,248,.08);color:var(--dm);border:1px solid var(--br);}
/* WASDE table */
.w-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;}
.w-tbl th{font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);text-align:right;padding:8px 10px;border-bottom:1px solid var(--br);}
.w-tbl th:first-child{text-align:left;}
.w-tbl td{padding:9px 10px;border-bottom:1px solid rgba(74,159,212,.05);font-size:12px;text-align:right;font-family:'Cormorant Garamond',serif;font-size:15px;}
.w-tbl td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--wh);}
.w-tbl tr:hover td{background:var(--ft);}
.w-chg{font-size:9px;margin-left:4px;}
/* Price table */
.p-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;}
.p-tbl th{font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dm);padding:7px 10px;border-bottom:1px solid var(--br);text-align:right;}
.p-tbl th:first-child{text-align:left;}
.p-tbl td{padding:10px 10px;border-bottom:1px solid rgba(74,159,212,.05);font-size:12px;text-align:right;}
.p-tbl td:first-child{text-align:left;color:var(--wh);font-weight:400;}
.p-tbl tr:hover td{background:var(--ft);}
.p-sym{font-size:9px;color:var(--dm);margin-left:4px;}
.p-usd{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;}
/* Ratio bar */
.ratio-bar{height:6px;background:rgba(74,159,212,.08);border:1px solid var(--br);border-radius:2px;overflow:hidden;margin:4px 0 2px;}
.ratio-fill{height:100%;border-radius:2px;transition:width .4s ease;}
/* Argentina retenciones */
.ret-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
.ret-card{background:var(--nv3);border:1px solid var(--br);padding:10px 12px;text-align:center;}
.ret-crop{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dm);margin-bottom:4px;}
.ret-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--rd);}
.ret-sub{font-size:8px;color:var(--dm);margin-top:2px;}
/* Footer */
footer{border-top:1px solid var(--br);padding:10px 40px;background:var(--nv2);display:flex;justify-content:space-between;align-items:center;}
.fb{display:flex;align-items:center;gap:11px;}
.fb-t{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--agro);}
.fn{font-size:8px;color:var(--dm);}
@media(max-width:900px){
  header{padding:0 16px;}.main{padding:16px 16px 48px;}
  .twocol{grid-template-columns:1fr;}.col-r{position:static;}
  .og{grid-template-columns:1fr 1fr;}.og5{grid-template-columns:repeat(3,1fr);}
  .cg2,.cg3,.cg4{grid-template-columns:1fr;}
  .sr4{grid-template-columns:repeat(2,1fr);}
  .tabrow{padding:0 16px;}.ret-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

const $ = id => document.getElementById(id);
const fmt = (v,d=1) => v==null?'—':Number(v).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtB = v => v==null?'—':`$${fmt(v/1000,1)}B`;
const fmtM = v => v==null?'—':`$${fmt(v,0)}M`;
const chgStr = (v,pct=false) => v==null?'—':`${v>=0?'+':''}${fmt(v,pct?2:1)}${pct?'%':''}`;
const clr = v => v>0?'g':v<0?'r':'a';

const C = {
  AGRO:'#4db87a', CBOT:'#e8c84a', COT:'#9b7fe8', WASDE:'#4a9fd4', ARG:'#e8a044',
  RD:'#d95f5f', GR:'#4db87a', OR:'#e8a044', CEL:'#4a9fd4',
  G4:'rgba(77,184,122,1)', G4a:'rgba(77,184,122,.15)',
  S1:'rgba(74,159,212,.15)', S2:'rgba(74,159,212,.08)',
  cot_long:'rgba(77,184,122,.7)', cot_long_a:'rgba(77,184,122,.15)',
  cot_short:'rgba(217,95,95,.7)', cot_short_a:'rgba(217,95,95,.15)',
};

const chartDefaults = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{
    backgroundColor:'#111827',borderColor:'#2d4060',borderWidth:1,
    titleColor:'#e8f0f8',bodyColor:'#94adc8',padding:9,
  }},
  scales:{
    x:{grid:{color:'rgba(31,45,64,.5)'},ticks:{color:'#4a6080',font:{size:9}}},
    y:{grid:{color:'rgba(31,45,64,.5)'},ticks:{color:'#4a6080',font:{size:9}}},
  },
};

const charts = {};
function mkChart(id, cfg) {
  if(charts[id]) charts[id].destroy();
  const ctx = $(id)?.getContext('2d');
  if(!ctx) return;
  charts[id] = new Chart(ctx, cfg);
  return charts[id];
}

function cotBadge(netPos, range52) {
  const pct = (netPos - range52.min) / (range52.max - range52.min) * 100;
  if(pct >= 70) return `<span class="cot-badge cot-long">&#9650; Sobrecomprado ${fmt(pct,0)}%ile</span>`;
  if(pct <= 30) return `<span class="cot-badge cot-short">&#9660; Sobrevendido ${fmt(pct,0)}%ile</span>`;
  return `<span class="cot-badge cot-neutral">&#9632; Neutral ${fmt(pct,0)}%ile</span>`;
}

function sxuBar(sxu, max=40) {
  const w = Math.min(100, sxu/max*100);
  const col = sxu > 30 ? C.GR : sxu > 20 ? C.OR : C.RD;
  return `<div class="ratio-bar"><div class="ratio-fill" style="width:${w}%;background:${col}"></div></div>`;
}

function buildTabs() {
  $('tabrow').innerHTML = TABS.map((t,i)=>
    `<button class="tab${i===0?' active':''}" onclick="showTab(${i})">${t}</button>`
  ).join('');
}

function showTab(i) {
  activeTab = i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  if(i===1) initCbotCharts();
  if(i===2) initCotCharts();
  if(i===3) initWasdeCharts();
  if(i===4) initArgCharts();
}

function buildCbot() {
  const f = D.futuros;

  const futsHtml = crops.map(crop => {
    const rows = f.filter(x=>x.crop===crop);
    return `<div style="margin-bottom:16px;">
      <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--cbot);margin-bottom:8px;">${crop}</div>
      <table class="p-tbl">
        <thead><tr><th>Vencimiento</th><th>Símbolo</th><th>USD/tn</th><th>Cambio</th></tr></thead>
        <tbody>
        ${rows.map(r=>{
          const price = r.price ?? r.spot;
          const chg = r.chg ?? 0;
          const label = r.base===null ? `<strong>${r.exp}</strong> <span class="p-sym">SPOT</span>` : r.exp;
          return `<tr>
            <td>${label}</td>
            <td style="color:var(--dm);font-size:11px;">${r.sym}</td>
            <td class="p-usd">${fmt(price)}</td>

        }).join('')}

  }).join('');

  return `

    {label:'Soja',data:h.soja,borderColor:C.CBOT,backgroundColor:C.CBOT+'22',tension:.3,fill:true,pointRadius:3,pointBackgroundColor:C.CBOT,yAxisID:'y'},
    {label:'Maíz',data:h.maiz,borderColor:C.AGRO,backgroundColor:'transparent',tension:.3,fill:false,pointRadius:3,pointBackgroundColor:C.AGRO,yAxisID:'y2'},
  ]},options:{...base,plugins:{...base.plugins,legend:{display:true,labels:{color:'#4a6080',font:{size:9},boxWidth:10}}},
    scales:{x:base.scales.x,y:{...base.scales.y,position:'left',ticks:{...base.scales.y.ticks,callback:v=>`$${v}`}},
      y2:{...base.scales.y,position:'right',grid:{display:false},ticks:{...base.scales.y.ticks,callback:v=>`$${v}`}}}}});

  mkChart('ch-cbot2',{type:'line',data:{labels:h.l,datasets:[
    {label:'Trigo',data:h.trigo,borderColor:C.CEL,backgroundColor:C.CEL+'22',tension:.3,fill:true,pointRadius:3,pointBackgroundColor:C.CEL,yAxisID:'y'},

  ]},options:{...base,plugins:{...base.plugins,legend:{display:true,labels:{color:'#4a6080',font:{size:9},boxWidth:10}}},

      y2:{...base.scales.y,position:'right',grid:{display:false},ticks:{...base.scales.y.ticks,callback:v=>`$${v*10}/tn`}}}}});

  // Curva futuros soja

  // Curva futuros maíz + trigo

  ]},options:{...base,plugins:{...base.plugins,legend:{display:true,labels:{color:'#4a6080',font:{size:9},boxWidth:10}}},

// ── PANEL 2 — COT POSICIONAMIENTO ────────────────────────────────────────────
function buildCot() {
  const cot = D.cot;
  const last = l => l.at(-1);
  const crops = [
    {k:'soja',  name:'Soja',        color:C.CBOT},
    {k:'maiz',  name:'Maíz',        color:C.AGRO},
    {k:'trigo', name:'Trigo',       color:C.CEL},
    {k:'aceite',name:'Aceite Soja', color:C.OR},
  ];
  const cotSummary = crops.map(c=>{
    const net = last(cot.mm[c.k]);
    const lng = last(cot.mmLong[c.k]);
    const sht = last(cot.mmShort[c.k]);
    const comm = last(cot.comm[c.k]);
    const r52 = cot.range52[c.k];
    const pct = r52 ? ((net - r52.min)/(r52.max - r52.min)*100) : 50;
    return `<div class="sc cot">
      <div class="sl">${c.name} &mdash; MM Net</div>
      <div class="sv ${clr(net)}">${net>=0?'+':''}${net}k</div>
      <div class="sn">Long ${lng}k &middot; Short ${sht}k</div>
      <div class="sn" style="margin-top:4px;">Comm: ${comm>=0?'+':''}${comm}k &middot; ${cotBadge(net, r52??{min:-100,max:100})}</div>
      <div class="ratio-bar" style="margin-top:6px;">
        <div class="ratio-fill" style="width:${Math.max(2,Math.min(100,pct))}%;background:${net>0?C.AGRO:C.RD}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--dm);margin-top:2px;">
        <span>Mín 52s: ${r52?.min}k</span><span>Máx 52s: ${r52?.max}k</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="sh">
    <div><div class="st">COT &mdash; Commitments of Traders</div>
    <div class="ss">CFTC &middot; Managed Money, Commercial &amp; Non-Reportable &middot; Miles de contratos</div></div>
    <div><div class="ln ${clr(last(cot.mm.soja))}">${last(cot.mm.soja)>=0?'+':''}${last(cot.mm.soja)}k</div><div class="ll">MM Soja neto &middot; Contratos</div></div>
  </div>
  <div class="src">CFTC &middot; Disaggregated COT Report &middot; Chicago Board of Trade &middot; Semana 2-Jun-2026</div>

  <div class="sr4" style="margin-bottom:18px;">${cotSummary}</div>

  <div class="cg2">
    <div class="card c-cot"><div class="ct">Soja — MM Net Position (miles de contratos)</div><div class="ch h240"><canvas id="ch-cot-soja"></canvas></div></div>
    <div class="card c-cot"><div class="ct">Maíz — MM Net Position (miles de contratos)</div><div class="ch h240"><canvas id="ch-cot-maiz"></canvas></div></div>
  </div>
  <div class="cg2">
    <div class="card c-cot"><div class="ct">Trigo — MM Net Position (miles de contratos)</div><div class="ch h240"><canvas id="ch-cot-trigo"></canvas></div></div>
    <div class="card c-cot"><div class="ct">Aceite Soja — MM Net Position (miles de contratos)</div><div class="ch h240"><canvas id="ch-cot-aceite"></canvas></div></div>
  </div>

  <div class="cg2" style="margin-top:0;">
    <div class="card c-cot"><div class="ct">Soja — Posiciones Brutas MM (Long vs Short)</div><div class="ch h240"><canvas id="ch-cot-soja-bruta"></canvas></div></div>
    <div class="card c-cot"><div class="ct">Maíz — MM vs Commercial Net</div><div class="ch h240"><canvas id="ch-cot-maiz-comm"></canvas></div></div>
  </div>

  <div style="margin-top:14px;padding:14px;background:var(--nv3);border:1px solid var(--br);border-left:2px solid var(--cot);">
    <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--cot);margin-bottom:8px;">&#9432; Lectura del COT</div>
    <div style="font-size:11px;color:var(--dm);line-height:1.7;">
      <strong style="color:var(--wh)">Managed Money (fondos especulativos)</strong>: posición neta = long − short. Positivo = fondos apostando a suba.
      Percentil <span style="color:var(--rd)">≥70%</span> = sobrecomprado (señal de techo). Percentil <span style="color:var(--g4)">≤30%</span> = sobrevendido (señal de piso).<br>
      <strong style="color:var(--wh)">Commercial (hedgers)</strong>: productores y exportadores cubriendo posición física. Típicamente inversa a MM.
      Posición commercial muy larga = compraron mucho en físico = demanda real fuerte.
    </div>
  </div>`;
}

      y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>`${v}k`}}}}});

  }]},options:{...base,scales:{x:{...base.scales.x,ticks:{...base.scales.x.ticks,maxRotation:45,font:{size:8}}},
    y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>`$${v}M`}}}}});

  mkChart('ch-arg-ciara',{type:'bar',data:{labels:a.ciara.l,datasets:[{
    label:'Liquidaciones USD M',data:a.ciara.vals,
    backgroundColor:'rgba(232,160,68,.6)',borderColor:C.ARG,borderWidth:1,
  }]},options:{...base,scales:{x:{...base.scales.x,ticks:{...base.scales.x.ticks,maxRotation:45,font:{size:8}}},
    y:{...base.scales.y,ticks:{...base.scales.y.ticks,callback:v=>`$${v}M`}}}}});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  buildKstrip();
  buildTabs();

  const panels = [buildResumen(), buildCbot(), buildCot(), buildWasde(), buildArg()];
  $('main').innerHTML = panels.map((html,i)=>
    `<div class="panel${i===0?' active':''}" id="panel-${i}">${html}</div>`
  ).join('');

  // Inicializar charts del panel activo (resumen no tiene, pero CBOT se init al primer click)
  // Pequeño delay para que el DOM esté listo
  setTimeout(()=>{
    // Pre-init resumen mini charts si hubiera
  }, 100);
}

document.addEventListener('DOMContentLoaded', init);
</script>
